<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منيو أبو النور | مطعم ومشهيات</title>
  
  <link rel="stylesheet" href="styles.css?v=4.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#d4af37" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png?v=4.0" />
  <link rel="icon" type="image/png" href="icon-192.png?v=4.0" />

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
  </script>
</head>
<body>

  <div class="app-container">
    <header class="main-header">
      <div class="logo-group">
        <img src="icon-192.png?v=4.0" alt="Abu Al-Nour Logo" class="header-logo" />
        <div>
          <div class="title-logo">أبو النور</div>
          <div class="subtitle">نظام المنيو الرقمي</div>
        </div>
      </div>
      <a href="cart.html" class="cart-anchor">
        <div class="cart-icon">🛒</div>
        <span id="cartCount" class="cart-badge">0</span>
      </a>
    </header>

    <main>
      <div class="nav-controls">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="ابحث عن طبقك المفضل..." />
        </div>
        
        <nav class="category-tabs" id="categoryTabs">
          <button class="tab active" data-category="all">الكل</button>
          <!-- Categories will be injected here -->
        </nav>
      </div>

      <div id="loading" class="loading-state">
        ⏳ جاري تحميل المنيو الشهي...
      </div>

      <div id="productsGrid" class="products-grid">
        <!-- Products will be injected here -->
      </div>
    </main>
  </div>

  <!-- PWA Install Popup -->
  <div id="installPopup" class="install-popup hidden">
    <div class="install-info">
      <img src="icon-192.png?v=4.0" class="install-logo" alt="Logo" />
      <div class="install-text">
        <h4>تثبيت منيو أبو النور</h4>
        <p>تصفح أسرع وبدون إنترنت في المرات القادمة!</p>
      </div>
    </div>
    <div class="install-actions">
      <button class="btn btn-primary" id="installBtn">تثبيت الآن</button>
      <button class="btn btn-edit" id="closeInstall">لاحقاً</button>
    </div>
  </div>

  <!-- Real-time script -->
  <script type="module" src="app.js"></script>
</body>
</html>
